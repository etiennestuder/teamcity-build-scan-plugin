name: "Experiment"
on: [ push, workflow_dispatch ]

jobs:
    job:
        runs-on: ubuntu-latest
        steps:
            -   uses: actions/checkout@v1
            -   name: Annotate
                uses: Attest/annotations-action@v1
                with:
                    token: ${{ secrets.GITHUB_TOKEN }}
                    input: './annotations.json'
                    title: 'Annotate Files'
